services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - RAILS_MASTER_KEY
      - SECRET_KEY_BASE
      - DISABLE_SSL
      - SMTP_ADDRESS
      - SMTP_PORT
      - SMTP_USERNAME
      - SMTP_PASSWORD
      - MAILER_FROM_ADDRESS
    volumes:
      - storage:/rails/storage

volumes:
  storage: